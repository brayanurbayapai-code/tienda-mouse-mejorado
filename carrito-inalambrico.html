<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito Inalámbrico</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-image: url("fondo.jpg");
            background-size: cover;
            background-position: center;
            margin: 0;
            padding: 0;
        }

        .contenedor{
            width: 450px;
            margin: 100px auto;
            background-color: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0px 0px 20px black;
        }

        img{
            width: 220px;
        }

        h1{
            color: #111;
        }

        .precio{
            color: green;
            font-size: 30px;
            font-weight: bold;
            margin: 20px 0;
        }

        button{
            background-color: #28a745;
            color: white;
            border: none;
            padding: 14px 25px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover{
            background-color: #1f7d34;
            transform: scale(1.05);
        }

        a{
            text-decoration: none;
        }

    </style>

</head>

<body>

    <div class="contenedor">

        <h1>🛒 Carrito Mouse Inalámbrico</h1>

        <img src="https://cdn-icons-png.flaticon.com/512/3523/3523887.png">

        <p>
            Mouse inalámbrico agregado al carrito correctamente.
        </p>

        <div class="precio">
            Total: S/ 120
        </div>

        <button>
            Finalizar Compra
        </button>

        <br><br>

        <a href="index.html">

            <button>
                Volver a la Tienda
            </button>

        </a>

    </div>

</body>
</html>
