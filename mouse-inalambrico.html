<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mouse Inalámbrico</title>

<style>

body{

    padding: 20px;
}

nav a{
    color: #00bfff;
    text-decoration: none;
}

.contenedor{
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 50px;
    flex-wrap: wrap;
    padding: 60px 20px;
}

img{
    width: 350px;
    background: white;
    padding: 20px;
    border-radius: 20px;
}

.info{
    max-width: 500px;
}

h1{
    font-size: 50px;
}

.precio{
    color: #00ff88;
    font-size: 40px;
    font-weight: bold;
}

button{
    background: #28a745;
    border: none;
    padding: 15px 30px;
    color: white;
    border-radius: 10px;
    cursor: pointer;
    font-size: 18px;

button:hover{
    background: #1f7d34;

</head>
<body>

<nav>
    <a href="index.html">⬅ Volver a la tienda</a>
